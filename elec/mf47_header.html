<body>

    <!-- 顶部工具栏 -->
    <div id="toolbar">
        <button id="btnUndo" title="撤销上一步">撤销</button>
        <button id="btnRedo" title="恢复上一步">恢复</button>
        <button id="btnAutoWire" title="自动完成所有接线">自动接线</button>
        <button id="btnStartSys" title="起动系统">起动系统</button>
        <button id="btnFiveStep" title="5点观察输入输出">5点步进</button>        
        <button id="faultBtn" title="选择故障进行设置">故障设置</button>
        <button id="btnReset" title="重置系统">重置系统</button>

        <select id="taskSelect">
        </select>

        <button id="btnShow">自动演示</button>
        <button id="btnStep">单步演示</button>
        <button id="btnTrain">演练</button>
        <button id="btnEval">评估</button>
        <button id="btnInstrument">选择仪表</button>
        <span style="width:1px;height:24px;background:#555;margin:0 8px;display:inline-block;"></span>

        <button id="btnGateway" title="硬件网关配置">硬件网关</button>
    </div>

    <!-- 故障设置弹窗 -->
    <div id="faultModal">
        <div class="modal-content">

            <div class="modal-header">
                故障场景配置
            </div>

            <div id="faultForm" class="modal-body">

            </div>

            <div class="modal-footer">
                <button id="cancelBtn" class="btn-cancel">取消</button>
                <button id="applyBtn" class="btn-apply">应用设置</button>
            </div>

        </div>
    </div>

    <!-- 仪表选择菜单 -->
    <div id="instrumentModal">
        <div class="modal-content">

            <div class="modal-header">
                选择要显示的仪表
            </div>

            <div id="instrumentForm" class="modal-body">

            </div>

            <div class="modal-footer">
                <button id="instrumentCancelBtn" class="btn-cancel">关闭</button>
            </div>

        </div>
    </div>

    <!-- 硬件网关面板 -->
    <div id="gatewayPanel" class="side-panel" style="display:none;">
        <div class="side-panel-header">
            <span>硬件网关配置</span>
            <div class="side-panel-actions">
                <button id="gatewayPanelClose" class="btn-close" title="关闭">&times;</button>
            </div>
        </div>
        <div class="side-panel-body" id="gatewayPanelBody">
            <!-- 由 GatewayPanel.createPanel() 填充 -->
        </div>
    </div>

    <!-- Konva容器 -->
    <div id="container"></div>
    <!-- 主程序 -->


</body>
</html>
